name: whatskit
description: "WhatsKit - 5 strumenti potenti per WhatsApp in un'unica app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Core utilities
  url_launcher: ^6.3.1            # Direct Chat: apri wa.me links
  share_plus: ^10.1.2             # Condivisione su WhatsApp
  flutter_svg: ^2.0.10+1          # Icone SVG
  google_fonts: ^6.2.1            # Font Roboto e altri

  # Images & stickers
  image_picker: ^1.1.2            # Sticker Maker: scegli foto
  image: ^4.3.0                   # Manipolazione immagini
  screenshot: ^3.0.0              # Fake Chat: screenshot esportabile
  path_provider: ^2.1.5           # Salvataggio file
  permission_handler: ^11.3.1     # Permessi storage

  # UI
  country_picker: ^2.0.27         # Direct Chat: selezione paese
  flutter_staggered_grid_view: ^0.7.0
  flutter_colorpicker: ^1.1.0

  # Storage
  shared_preferences: ^2.3.3      # Recenti, preferiti, settings

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
