<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 8: Glassmorphism -->
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <radialGradient id="orb8a" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb8b" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#BE185D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="glassBorder8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="blur8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg8)"/>

  <!-- Blurred color orbs behind glass -->
  <g filter="url(#blur8)">
    <circle cx="120" cy="380" r="100" fill="url(#orb8a)"/>
    <circle cx="400" cy="120" r="80" fill="url(#orb8b)"/>
    <circle cx="380" cy="380" r="60" fill="#FB7185" opacity="0.6"/>
  </g>

  <!-- Glassmorphism chat bubble -->
  <g>
    <!-- Glass body with backdrop tint -->
    <path d="M 110 130
             Q 110 100 140 100
             L 372 100
             Q 402 100 402 130
             L 402 320
             Q 402 350 372 350
             L 230 350
             L 150 410
             L 175 350
             L 140 350
             Q 110 350 110 320
             Z"
          fill="url(#glass8)"/>
    <!-- Glass border -->
    <path d="M 110 130
             Q 110 100 140 100
             L 372 100
             Q 402 100 402 130
             L 402 320
             Q 402 350 372 350
             L 230 350
             L 150 410
             L 175 350
             L 140 350
             Q 110 350 110 320
             Z"
          fill="none" stroke="url(#glassBorder8)" stroke-width="2"/>
    <!-- Glass top highlight -->
    <path d="M 130 110
             Q 145 110 165 115
             L 360 115
             Q 380 118 390 130"
          stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
  </g>

  <!-- Sparkle inside glass -->
  <g transform="translate(256 220)">
    <path d="M 0 -55 L 12 -12 L 55 0 L 12 12 L 0 55 L -12 12 L -55 0 L -12 -12 Z"
          fill="white"/>
    <path d="M 0 -35 L 8 -8 L 35 0 L 8 8 L 0 35 L -8 8 L -35 0 L -8 -8 Z"
          fill="#FCD34D"/>
  </g>

  <!-- Small glass particles -->
  <circle cx="170" cy="170" r="8" fill="white" opacity="0.6"/>
  <circle cx="350" cy="280" r="6" fill="white" opacity="0.5"/>
  <circle cx="305" cy="170" r="4" fill="white" opacity="0.7"/>
</svg>
