<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 14: Holographic Card 3D -->
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <!-- Holographic foil gradient -->
    <linearGradient id="holo14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB7185"/>
      <stop offset="20%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#34D399"/>
      <stop offset="60%" stop-color="#22D3EE"/>
      <stop offset="80%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <!-- Card shine -->
    <linearGradient id="shine14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="cardEdge14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow14" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow14" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg14)"/>

  <!-- Background glow halo -->
  <circle cx="256" cy="256" r="200" fill="url(#glow14)"/>

  <!-- Tilted holographic card (perspective) -->
  <g transform="translate(256 256) rotate(-8)">
    <!-- Card back shadow layer -->
    <g filter="url(#cardShadow14)">
      <!-- Card base -->
      <rect x="-130" y="-180" width="260" height="360" rx="24"
            fill="url(#holo14)"/>
      <!-- Holographic shimmer overlay -->
      <rect x="-130" y="-180" width="260" height="360" rx="24"
            fill="url(#shine14)"/>
      <!-- Card edge highlight -->
      <rect x="-130" y="-180" width="260" height="360" rx="24"
            fill="none" stroke="url(#cardEdge14)" stroke-width="2"/>
    </g>

    <!-- Card content -->
    <g>
      <!-- WK monogram stylized -->
      <g transform="translate(0 -50)">
        <text x="0" y="0"
              text-anchor="middle"
              font-family="Arial Black, sans-serif"
              font-weight="900"
              font-size="100"
              fill="white"
              opacity="0.95">WK</text>
        <text x="0" y="0"
              text-anchor="middle"
              font-family="Arial Black, sans-serif"
              font-weight="900"
              font-size="100"
              fill="none"
              stroke="white"
              stroke-width="1.5"
              opacity="0.7">WK</text>
      </g>
      <!-- Subtitle -->
      <text x="0" y="20"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-weight="600"
            font-size="14"
            fill="white"
            opacity="0.9"
            letter-spacing="3">WHATSKIT</text>
      <!-- Decorative line -->
      <line x1="-50" y1="40" x2="50" y2="40"
            stroke="white" stroke-width="1.5" opacity="0.5"/>
      <!-- Bottom badge -->
      <g transform="translate(0 80)">
        <rect x="-60" y="-12" width="120" height="24" rx="12"
              fill="white" opacity="0.95"/>
        <text x="0" y="4"
              text-anchor="middle"
              font-family="Arial, sans-serif"
              font-weight="700"
              font-size="11"
              fill="#831843"
              letter-spacing="2">PREMIUM</text>
      </g>
      <!-- Star icons row -->
      <g transform="translate(0 130)">
        <path d="M -36 0 L -33 -8 L -25 -8 L -31 -3 L -29 5 L -36 0 L -43 5 L -41 -3 L -47 -8 L -39 -8 Z"
              fill="white" opacity="0.9"/>
        <path d="M 0 0 L 3 -8 L 11 -8 L 5 -3 L 7 5 L 0 0 L -7 5 L -5 -3 L -11 -8 L -3 -8 Z"
              fill="white" opacity="0.9"/>
        <path d="M 36 0 L 39 -8 L 47 -8 L 41 -3 L 43 5 L 36 0 L 29 5 L 31 -3 L 25 -8 L 33 -8 Z"
              fill="white" opacity="0.9"/>
      </g>
    </g>
  </g>

  <!-- Sparkles around card -->
  <g fill="white">
    <path d="M 90 130 L 92 122 L 100 120 L 92 118 L 90 110 L 88 118 L 80 120 L 88 122 Z" opacity="0.85"/>
    <path d="M 420 200 L 422 192 L 430 190 L 422 188 L 420 180 L 418 188 L 410 190 L 418 192 Z" opacity="0.7"/>
    <path d="M 380 400 L 381 396 L 385 395 L 381 394 L 380 390 L 379 394 L 375 395 L 379 396 Z" opacity="0.8"/>
  </g>
</svg>
