<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 3: Sticker Smile -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>

  <!-- White chat bubble with tail bottom-left -->
  <path d="M 100 140
           Q 100 105 135 105
           L 377 105
           Q 412 105 412 140
           L 412 340
           Q 412 375 377 375
           L 245 375
           L 155 425
           L 195 375
           L 135 375
           Q 100 375 100 340
           Z"
        fill="white"/>

  <!-- Smiley face inside bubble -->
  <g transform="translate(256 240)">
    <!-- Face circle -->
    <circle cx="0" cy="0" r="100" fill="#FCD34D"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#F59E0B" stroke-width="6"/>

    <!-- Eyes -->
    <ellipse cx="-32" cy="-15" rx="9" ry="14" fill="#1F2937"/>
    <ellipse cx="32" cy="-15" rx="9" ry="14" fill="#1F2937"/>
    <!-- Eye shine -->
    <circle cx="-30" cy="-20" r="3" fill="white"/>
    <circle cx="34" cy="-20" r="3" fill="white"/>

    <!-- Smile -->
    <path d="M -38 22
             Q 0 60 38 22"
          fill="none" stroke="#1F2937" stroke-width="9" stroke-linecap="round"/>

    <!-- Cheeks -->
    <circle cx="-55" cy="20" r="10" fill="#FB7185" opacity="0.6"/>
    <circle cx="55" cy="20" r="10" fill="#FB7185" opacity="0.6"/>
  </g>
</svg>
