<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 15: Neon Voxel Cube - Tech/AI -->
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </linearGradient>

    <!-- Cube faces -->
    <linearGradient id="cubeTop15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
    <linearGradient id="cubeRight15" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <linearGradient id="cubeFront15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>

    <!-- Voxel pieces -->
    <linearGradient id="vTop15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="vRight15" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#164E63"/>
    </linearGradient>
    <linearGradient id="vFront15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>

    <linearGradient id="vTop15B" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
    <linearGradient id="vRight15B" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9D174D"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="vFront15B" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>

    <filter id="cubeShadow15" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg15)"/>

  <!-- Grid pattern -->
  <g opacity="0.1" stroke="white" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Main isometric cube -->
  <g transform="translate(256 280)" filter="url(#cubeShadow15)">
    <!-- Top face -->
    <polygon points="-100,-50 0,-100 100,-50 0,0"
             fill="url(#cubeTop15)" stroke="#FEF3C7" stroke-width="1.5"/>
    <!-- Right face -->
    <polygon points="100,-50 100,70 0,120 0,0"
             fill="url(#cubeRight15)"/>
    <!-- Front face -->
    <polygon points="-100,-50 0,0 0,120 -100,70"
             fill="url(#cubeFront15)"/>

    <!-- Cube edges highlight -->
    <line x1="-100" y1="-50" x2="0" y2="0" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="-50" x2="0" y2="0" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Floating voxel piece - cyan (top-right exploded) -->
  <g transform="translate(380 130) scale(0.4)">
    <polygon points="-80,-40 0,-80 80,-40 0,0"
             fill="url(#vTop15)"/>
    <polygon points="80,-40 80,80 0,120 0,0"
             fill="url(#vRight15)"/>
    <polygon points="-80,-40 0,0 0,120 -80,80"
             fill="url(#vFront15)"/>
  </g>

  <!-- Floating voxel piece - pink (left exploded) -->
  <g transform="translate(120 380) scale(0.45)">
    <polygon points="-80,-40 0,-80 80,-40 0,0"
             fill="url(#vTop15B)"/>
    <polygon points="80,-40 80,80 0,120 0,0"
             fill="url(#vRight15B)"/>
    <polygon points="-80,-40 0,0 0,120 -80,80"
             fill="url(#vFront15B)"/>
  </g>

  <!-- Mini sparkles -->
  <g fill="white">
    <circle cx="100" cy="100" r="4" opacity="0.9"/>
    <circle cx="430" cy="350" r="3" opacity="0.8"/>
    <circle cx="60" cy="200" r="2" opacity="0.7"/>
    <circle cx="450" cy="200" r="2.5" opacity="0.7"/>
    <circle cx="200" cy="80" r="2" opacity="0.6"/>
  </g>

  <!-- Letter on cube top face -->
  <g transform="translate(256 235)">
    <text x="0" y="0"
          text-anchor="middle"
          font-family="Arial Black, sans-serif"
          font-weight="900"
          font-size="48"
          fill="#9A3412"
          opacity="0.85">W</text>
  </g>
</svg>
