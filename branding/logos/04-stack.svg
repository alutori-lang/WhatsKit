<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 4: Multi-Stack (multiple chat bubbles) -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg4)"/>

  <!-- Back bubble (smallest, shifted top-right) -->
  <path d="M 200 90
           Q 200 65 225 65
           L 410 65
           Q 435 65 435 90
           L 435 220
           Q 435 245 410 245
           L 295 245
           L 240 285
           L 260 245
           L 225 245
           Q 200 245 200 220
           Z"
        fill="white" opacity="0.4"/>

  <!-- Middle bubble -->
  <path d="M 130 175
           Q 130 148 158 148
           L 380 148
           Q 408 148 408 175
           L 408 310
           Q 408 337 380 337
           L 285 337
           L 220 380
           L 245 337
           L 158 337
           Q 130 337 130 310
           Z"
        fill="white" opacity="0.7"/>

  <!-- Front bubble (largest, with content) -->
  <path d="M 80 240
           Q 80 210 110 210
           L 360 210
           Q 390 210 390 240
           L 390 390
           Q 390 420 360 420
           L 230 420
           L 145 460
           L 175 420
           L 110 420
           Q 80 420 80 390
           Z"
        fill="white"/>

  <!-- Three dots inside front bubble (typing indicator style) -->
  <circle cx="180" cy="315" r="14" fill="#10B981"/>
  <circle cx="235" cy="315" r="14" fill="#10B981"/>
  <circle cx="290" cy="315" r="14" fill="#10B981"/>
</svg>
