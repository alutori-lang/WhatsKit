<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 10: Chrome Metal Premium -->
  <defs>
    <!-- Background metallic green -->
    <linearGradient id="bg10" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <!-- Top sheen -->
    <linearGradient id="sheen10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Chrome bubble -->
    <linearGradient id="chrome10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#E5E7EB"/>
      <stop offset="50%" stop-color="#9CA3AF"/>
      <stop offset="55%" stop-color="#6B7280"/>
      <stop offset="80%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
    <!-- Metallic green highlight on bubble -->
    <linearGradient id="bubbleAccent10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Engraved logo -->
    <linearGradient id="engrave10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="50%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow10" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with metallic gradient -->
  <rect width="512" height="512" rx="112" fill="url(#bg10)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen10)"/>

  <!-- Premium border highlight -->
  <rect x="2" y="2" width="508" height="508" rx="111"
        fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <rect x="6" y="6" width="500" height="500" rx="108"
        fill="none" stroke="black" stroke-width="1" opacity="0.2"/>

  <!-- Chrome chat bubble -->
  <g filter="url(#shadow10)">
    <!-- Chrome base -->
    <path d="M 110 130
             Q 110 95 145 95
             L 367 95
             Q 402 95 402 130
             L 402 325
             Q 402 360 367 360
             L 230 360
             L 145 425
             L 175 360
             L 145 360
             Q 110 360 110 325
             Z"
          fill="url(#chrome10)"/>
    <!-- Green accent overlay -->
    <path d="M 110 130
             Q 110 95 145 95
             L 367 95
             Q 402 95 402 130
             L 402 325
             Q 402 360 367 360
             L 230 360
             L 145 425
             L 175 360
             L 145 360
             Q 110 360 110 325
             Z"
          fill="url(#bubbleAccent10)"/>
    <!-- Top metallic highlight -->
    <path d="M 130 110
             Q 145 100 175 100
             L 350 100
             Q 380 100 392 115"
          stroke="white" stroke-width="3" fill="none" opacity="0.8"/>
  </g>

  <!-- Embossed W in center -->
  <g transform="translate(256 230)">
    <text x="0" y="18"
          text-anchor="middle"
          font-family="Arial Black, sans-serif"
          font-weight="900"
          font-size="115"
          fill="url(#engrave10)"
          stroke="#022C22"
          stroke-width="1">W</text>
    <!-- Highlight on W -->
    <text x="0" y="14"
          text-anchor="middle"
          font-family="Arial Black, sans-serif"
          font-weight="900"
          font-size="115"
          fill="none"
          stroke="white"
          stroke-width="0.5"
          opacity="0.5">W</text>
  </g>

  <!-- Premium star accents -->
  <g transform="translate(390 130)" opacity="0.9">
    <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z"
          fill="#FCD34D"/>
  </g>
  <g transform="translate(95 405)" opacity="0.7">
    <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z"
          fill="#FCD34D"/>
  </g>
</svg>
