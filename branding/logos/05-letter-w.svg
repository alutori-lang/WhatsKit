<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo 5: Letter W Monogram -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg5)"/>

  <!-- Subtle chat bubble outline as background -->
  <path d="M 80 110
           Q 80 80 110 80
           L 402 80
           Q 432 80 432 110
           L 432 360
           Q 432 390 402 390
           L 240 390
           L 145 450
           L 180 390
           L 110 390
           Q 80 390 80 360
           Z"
        fill="white" opacity="0.95"/>

  <!-- Bold W letter -->
  <g transform="translate(256 235)">
    <!-- W constructed from 4 diagonal strokes -->
    <path d="M -130 -90
             L -90 -90
             L -65 60
             L -38 -90
             L 38 -90
             L 65 60
             L 90 -90
             L 130 -90
             L 90 110
             L 30 110
             L 0 -30
             L -30 110
             L -90 110
             Z"
          fill="#128C7E"/>
  </g>

  <!-- Small chat tail dot accent -->
  <circle cx="380" cy="345" r="22" fill="#25D366"/>
  <circle cx="380" cy="345" r="14" fill="white"/>
</svg>
